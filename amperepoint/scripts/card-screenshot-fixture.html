<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #0b0d0f;
      }

      body {
        box-sizing: border-box;
        padding: 24px;
        font-family: Inter, system-ui, sans-serif;
      }

      amperepoint-q22-card {
        display: block;
        width: 100%;
      }
    </style>
    <script src="../../custom_components/tuyaextend_amperepoint/frontend/amperepoint-q22-card.js"></script>
  </head>
  <body>
    <script>
      class MockHaIcon extends HTMLElement {
        connectedCallback() {
          if (this.shadowRoot) return;
          const root = this.attachShadow({ mode: "open" });
          root.innerHTML = `
            <style>
              :host { display: inline-grid; place-items: center; }
              svg { width: 100%; height: 100%; fill: currentColor; }
            </style>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="7"></circle>
            </svg>
          `;
        }
      }
      customElements.define("ha-icon", MockHaIcon);

      window.renderAmperepointPreview = async ({ entities, states }) => {
        await customElements.whenDefined("amperepoint-q22-card");
        document.body.replaceChildren();
        const card = document.createElement("amperepoint-q22-card");
        card.setConfig({
          title: "AmperePoint Q11",
          subtitle: "AmperePoint Q Series",
          language: "pl",
          maxPowerKw: 22,
          entities,
        });
        document.body.appendChild(card);
        card.hass = {
          states,
          language: "pl",
          locale: { language: "pl" },
          callService: async () => {},
        };
        await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));
        const details = card.querySelector(".diagnostics");
        if (details) details.open = false;
        await new Promise((resolve) => setTimeout(resolve, 250));
        await new Promise((resolve) => requestAnimationFrame(() => requestAnimationFrame(resolve)));
        const rect = card.getBoundingClientRect();
        return {
          x: rect.x,
          y: rect.y,
          width: Math.ceil(rect.width),
          height: Math.ceil(rect.height),
        };
      };
    </script>
  </body>
</html>
